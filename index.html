<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Agent on Demand - Travel Information</title>
    
    <style>
        :root {
            color-scheme: light;
            --font: system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue","Noto Sans","Liberation Sans",Arial,sans-serif;
            --navy: #0a1f5c;
            --navy-mid: #1a3a8f;
            --gold: #c8973a;
            --gold-light: #e8b860;
            --surface: #f7f8fc;
            --white: #ffffff;
            --text-primary: #0f1d3d;
            --text-secondary: #5a6480;
            --text-muted: #9aa0b8;
            --border: #d8dce8;
            --border-focus: #1a3a8f;
            --input-bg: #ffffff;
            --success: #2a7f5c;
            --radius: 10px;
            --radius-sm: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 0;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: var(--white);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .phone-shell {
                max-width: 600px;
            }
        }

        /* Header */
        .page-header {
            background: var(--white);
            padding: 22px 20px 28px;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .header-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
        }

        .page-header h1 {
            font-family: var(--font);
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }

        .page-header p {
            font-family: var(--font);
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            font-weight: 400;
        }

        /* Form area */
        .form-area {
            flex: 1;
            padding: 24px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fadeUp 0.4s ease both;
        }

        .field-group:nth-child(1) { animation-delay: 0.05s; }
        .field-group:nth-child(2) { animation-delay: 0.10s; }
        .field-group:nth-child(3) { animation-delay: 0.15s; }
        .field-group:nth-child(4) { animation-delay: 0.20s; }
        .field-group:nth-child(5) { animation-delay: 0.25s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        label {
            font-family: var(--font);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0;
            text-transform: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        input[type="text"],
        input[type="date"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 13px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            appearance: none;
            color-scheme: light;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus,
        select:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(26,58,143,0.12);
        }

        .select-wrap {
            position: relative;
        }

        .select-wrap select {
            padding-right: 40px;
            cursor: pointer;
        }

        .select-arrow {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--navy-mid);
            pointer-events: none;
            font-size: 18px;
            line-height: 1;
        }

        .form-text {
            font-size: 11.5px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Connect section */
        .connect-section {
            background: #f0f3fb;
            border-radius: var(--radius);
            padding: 18px;
            border: 1.5px solid #e0e5f4;
            animation: fadeUp 0.4s ease 0.3s both;
        }

        .connect-title {
            font-family: var(--font);
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .radio-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: white;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .radio-option:hover {
            border-color: var(--navy-mid);
        }

        .radio-option.selected {
            border-color: var(--navy);
            background: #f5f7ff;
        }

        .radio-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .radio-custom {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: border-color 0.2s;
        }

        .radio-option.selected .radio-custom {
            border-color: var(--navy);
        }

        .radio-dot {
            width: 10px;
            height: 10px;
            background: var(--navy);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.15s, transform 0.15s;
            transform: scale(0.5);
        }

        .radio-option.selected .radio-dot {
            opacity: 1;
            transform: scale(1);
        }

        .radio-icon {
            width: 34px;
            height: 34px;
            background: var(--navy);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
            color: white;
        }

        .radio-option:not(.selected) .radio-icon {
            background: #e8eaf2;
            color: #5a6480;
        }

        .radio-content {
            flex: 1;
        }

        .radio-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .radio-sub {
            font-size: 11.5px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .ewt-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }

        .ewt-loading {
            background: #e8eaf2;
            color: var(--text-muted);
        }

        .ewt-low {
            background: #d1f4e0;
            color: #1e7e34;
        }

        .ewt-medium {
            background: #fff3cd;
            color: #856404;
        }

        .ewt-high {
            background: #f8d7da;
            color: #721c24;
        }

        /* Phone number field (hidden by default) */
        #phoneNumberField {
            display: none;
        }

        /* Submit */
        .submit-wrap {
            padding: 0 20px 32px;
            animation: fadeUp 0.4s ease 0.4s both;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.2s, transform 0.1s;
        }

        .submit-btn:hover {
            background: var(--navy-mid);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="phone-shell">
        
        <!-- Header -->
        <div class="page-header">
            <img 
                src="https://storage.googleapis.com/gcp-wxcctoolkit-nprd-41927.appspot.com/assets/DwOVM0HYZPOjxemCLo1foEsxRmm1/AOD.jpg"
                alt="Agent on Demand Header" 
                class="header-image">
            <h1>Travel Information</h1>
            <p>Fill out the information below and we'll connect you with an expert.</p>
        </div>

        <!-- Form -->
        <div class="form-area" id="formArea">

            <!-- Final Destination -->
            <div class="field-group">
                <label>Final Destination</label>
                <input type="text" id="finalDestination" placeholder="Enter your final destination">
            </div>

            <!-- Last Name -->
            <div class="field-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Enter your last name">
            </div>

            <!-- Help Category -->
            <div class="field-group">
                <label>What do you need help with?</label>
                <div class="select-wrap">
                    <select id="helpCategory">
                        <option value="">Select an option...</option>
                        <option value="changeFlight">Change my flight</option>
                        <option value="changeSeat">Change my seat</option>
                        <option value="Baggage">Baggage Issues</option>
                        <option value="somethingElse">Something Else</option>
                    </select>
                    <span class="select-arrow">⌄</span>
                </div>
            </div>

            <!-- Date of Birth -->
            <div class="field-group">
                <label>Date of Birth</label>
                <input type="date" id="dateOfBirth">
            </div>

            <!-- Contact Method -->
            <div class="connect-section">
                <div class="connect-title">How should we contact you?</div>
                <div class="radio-options">

                    <label class="radio-option" data-value="callme" onclick="selectOption(this)">
                        <div class="radio-custom"><div class="radio-dot"></div></div>
                        <div class="radio-icon">📞</div>
                        <div class="radio-content">
                            <div class="radio-label">
                                Call Me
                                <span class="ewt-badge ewt-loading" id="ewtCallMe">Loading...</span>
                            </div>
                            <div class="radio-sub">We'll call you back</div>
                        </div>
                    </label>

                    <label class="radio-option" data-value="talknow" onclick="selectOption(this)">
                        <div class="radio-custom"><div class="radio-dot"></div></div>
                        <div class="radio-icon">🎧</div>
                        <div class="radio-content">
                            <div class="radio-label">
                                Talk Now
                                <span class="ewt-badge ewt-loading" id="ewtTalkNow">Loading...</span>
                            </div>
                            <div class="radio-sub">Connect immediately via browser</div>
                        </div>
                    </label>

                    <label class="radio-option" data-value="video" onclick="selectOption(this)">
                        <div class="radio-custom"><div class="radio-dot"></div></div>
                        <div class="radio-icon">📹</div>
                        <div class="radio-content">
                            <div class="radio-label">
                                Video
                                <span class="ewt-badge ewt-loading" id="ewtVideo">Loading...</span>
                            </div>
                            <div class="radio-sub">Face-to-face with an expert</div>
                        </div>
                    </label>

                    <label class="radio-option" data-value="text" onclick="selectOption(this)">
                        <div class="radio-custom"><div class="radio-dot"></div></div>
                        <div class="radio-icon">💬</div>
                        <div class="radio-content">
                            <div class="radio-label">
                                Text
                                <span class="ewt-badge ewt-loading" id="ewtText">Loading...</span>
                            </div>
                            <div class="radio-sub">SMS messaging</div>
                        </div>
                    </label>

                    <label class="radio-option" data-value="appleBusiness" onclick="selectOption(this)">
                        <div class="radio-custom"><div class="radio-dot"></div></div>
                        <div class="radio-icon">💼</div>
                        <div class="radio-content">
                            <div class="radio-label">
                                Apple Messages for Business
                                <span class="ewt-badge ewt-loading" id="ewtApple">Loading...</span>
                            </div>
                            <div class="radio-sub">iMessage chat</div>
                        </div>
                    </label>

                </div>
            </div>

            <!-- Phone Number (Conditional) -->
            <div class="field-group" id="phoneNumberField">
                <label>Phone Number</label>
                <input
                    type="tel"
                    id="phoneNumber"
                    placeholder="18472695644"
                    maxlength="11"
                    inputmode="numeric">
                <div class="form-text">Enter 11 digits starting with 1 (e.g., 18472695644)</div>
            </div>

        </div>

        <!-- Submit -->
        <div class="submit-wrap">
            <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Submit</button>
        </div>

    </div>

    <script>
        // ===== CONFIGURATION =====
        const API_CONFIG = {
            baseUrl: 'https://api.wxcc-us1.cisco.com/v1',
            accessToken: 'NDQzZTg1YTctYjQ4YS00ZTJjLTk0NzgtNzM2MGM1YWMzYjU1OWU3ZmVkOWEtZWEy_PF84_000a1aaf-cc6f-4481-9e9a-660ad7f4b9d0',
            orgId: '000a1aaf-cc6f-4481-9e9a-660ad7f4b9d0',
            queueIds: {
                phone: 'd60c2ae4-9196-442c-860e-c132a1dbe1c3',
                video: 'd1fa6df6-a8f6-4a0e-bf3a-fd9e9a623b4a',
                text: '2668c442-9a18-4ca6-bd4b-c4e2cffa186b',
                appleBusiness: '2668c442-9a18-4ca6-bd4b-c4e2cffa186b'
            }
        };

        const WEBHOOK_URL = 'https://hooks.us.webexconnect.io/events/1V5WO20HJQ';

        // ===== EWT FUNCTIONS =====
        
        function formatWaitTime(seconds) {
            if (seconds === null || seconds === undefined || seconds === 0) {
                return '0 mins';
            }
            const mins = Math.ceil(seconds / 60);
            return `${mins} min${mins !== 1 ? 's' : ''}`;
        }

        function getWaitTimeClass(seconds) {
            if (seconds === null || seconds === undefined || seconds === 0) {
                return 'ewt-low';
            }
            if (seconds < 120) return 'ewt-low';
            if (seconds < 600) return 'ewt-medium';
            return 'ewt-high';
        }

        async function fetchEWT(queueId) {
            try {
                const response = await fetch(
                    `${API_CONFIG.baseUrl}/ewt?lookbackMinutes=60&queueId=${queueId}&orgId=${API_CONFIG.orgId}&minValidSamples=1`,
                    {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${API_CONFIG.accessToken}`,
                            'Accept': 'application/json'
                        }
                    }
                );

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                const milliseconds = data.estimatedWaitTime;

                if (milliseconds === null || milliseconds === undefined) return 0;

                return Math.round(milliseconds / 1000);
            } catch (error) {
                console.error(`Error fetching EWT for queue ${queueId}:`, error);
                return 0;
            }
        }

        function updateEWTBadge(elementId, waitTimeSeconds) {
            const badge = document.getElementById(elementId);
            if (!badge) return;

            badge.classList.remove('ewt-loading', 'ewt-low', 'ewt-medium', 'ewt-high');
            const cssClass = getWaitTimeClass(waitTimeSeconds);
            badge.classList.add(cssClass);
            badge.textContent = formatWaitTime(waitTimeSeconds);
        }

        async function updateAllEWT() {
            const [phoneEWT, videoEWT, textEWT, appleEWT] = await Promise.all([
                fetchEWT(API_CONFIG.queueIds.phone),
                fetchEWT(API_CONFIG.queueIds.video),
                fetchEWT(API_CONFIG.queueIds.text),
                fetchEWT(API_CONFIG.queueIds.appleBusiness)
            ]);

            // Both Call Me and Talk Now use the same phone queue EWT
            updateEWTBadge('ewtCallMe', phoneEWT);
            updateEWTBadge('ewtTalkNow', phoneEWT);
            updateEWTBadge('ewtVideo', videoEWT);
            updateEWTBadge('ewtText', textEWT);
            updateEWTBadge('ewtApple', appleEWT);

            // All options are now always enabled
        }

        // Initialize EWT on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateAllEWT();
            setInterval(updateAllEWT, 30000);
        });

        // ===== FORM HANDLING =====

        let selectedMethod = null;

        function selectOption(el) {
            document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedMethod = el.getAttribute('data-value');

            const phoneField = document.getElementById('phoneNumberField');
            const phoneInput = document.getElementById('phoneNumber');

            // Show phone number field for callme, talknow, and text
            if (selectedMethod === 'callme' || selectedMethod === 'talknow' || selectedMethod === 'text') {
                phoneField.style.display = 'flex';
                phoneInput.required = true;
            } else {
                phoneField.style.display = 'none';
                phoneInput.required = false;
                phoneInput.value = '';
            }
        }

        // Phone number formatting
        document.getElementById('phoneNumber').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            e.target.value = value;
        });

        // Form submission
        async function handleSubmit() {
            const finalDestination = document.getElementById('finalDestination').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const helpCategory = document.getElementById('helpCategory').value;
            const dateOfBirth = document.getElementById('dateOfBirth').value;
            const phoneNumber = document.getElementById('phoneNumber').value.trim();

            // Validation
            if (!finalDestination || !lastName || !helpCategory || !dateOfBirth || !selectedMethod) {
                alert('Agent on Demand says: Please fill in all fields and select a contact method.');
                return;
            }

            // Phone number validation for callme, talknow, and text
            if ((selectedMethod === 'callme' || selectedMethod === 'talknow' || selectedMethod === 'text') && !phoneNumber) {
                alert('Agent on Demand says: Please enter a phone number for phone or text contact.');
                return;
            }

            if ((selectedMethod === 'callme' || selectedMethod === 'talknow' || selectedMethod === 'text') && phoneNumber) {
                if (phoneNumber.length !== 11 || !phoneNumber.startsWith('1')) {
                    alert('Agent on Demand says: Please enter a valid US phone number in format: 18472695644 (11 digits starting with 1)');
                    return;
                }
            }

            // Handle Talk Now - redirect to audio chat
            if (selectedMethod === 'talknow') {
                const params = new URLSearchParams();
                params.set('name', `${finalDestination} - ${lastName}`);
                params.set('destination', finalDestination);
                params.set('phone', phoneNumber);
                
                const targetUrl = 'https://wxsd-sales.github.io/wxcc-chat-and-more-customer/index-audio.html?' + params.toString();
                window.location.href = targetUrl;
                return;
            }

            // Handle Apple Messages for Business
            if (selectedMethod === 'appleBusiness') {
                try {
                    const messagesUrlMapping = {
                        'changeFlight': 'https://bcrw.apple.com/messages/api/messageprofiles/redirecthelper?service=iMessage&recipient=urn:biz:6f6ab203-6ead-450a-bcae-24662cb6aae0&body=Change%20Flight',
                        'changeSeat': 'https://bcrw.apple.com/messages/api/messageprofiles/redirecthelper?service=iMessage&recipient=urn:biz:6f6ab203-6ead-450a-bcae-24662cb6aae0&body=Change%20Seat',
                        'Baggage': 'https://bcrw.apple.com/messages/api/messageprofiles/redirecthelper?service=iMessage&recipient=urn:biz:6f6ab203-6ead-450a-bcae-24662cb6aae0&body=Baggage%20Issues',
                        'somethingElse': 'https://bcrw.apple.com/messages/api/messageprofiles/redirecthelper?service=iMessage&recipient=urn:biz:6f6ab203-6ead-450a-bcae-24662cb6aae0&body=Something%20Else'
                    };

                    const messagesUrl = messagesUrlMapping[helpCategory];
                    if (!messagesUrl) {
                        alert('Agent on Demand says: Invalid help category selected.');
                        return;
                    }

                    window.open(messagesUrl, '_blank');
                    alert('Agent on Demand says: Opening Apple Messages for Business...');

                    // Reset form
                    document.getElementById('finalDestination').value = '';
                    document.getElementById('lastName').value = '';
                    document.getElementById('helpCategory').value = '';
                    document.getElementById('dateOfBirth').value = '';
                    document.getElementById('phoneNumber').value = '';
                    document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
                    selectedMethod = null;
                    document.getElementById('phoneNumberField').style.display = 'none';
                    return;
                } catch (error) {
                    console.error('Error opening Apple Messages:', error);
                    alert('Agent on Demand says: There was an error opening Apple Messages. Please try again.');
                    return;
                }
            }

            // Handle webhook submission for callme, video, and text
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                const webhookData = {
                    finalDestination: finalDestination,
                    lastName: lastName,
                    helpCategory: helpCategory,
                    dateOfBirth: dateOfBirth,
                    contactMethod: selectedMethod,
                    timestamp: new Date().toISOString()
                };

                // Include phone number for callme and text (not video)
                if (selectedMethod === 'callme' || selectedMethod === 'text') {
                    webhookData.phoneNumber = phoneNumber;
                }

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(webhookData)
                });

                if (response.ok) {
                    alert('Agent on Demand says: Form submitted successfully!');
                    
                    // Reset form
                    document.getElementById('finalDestination').value = '';
                    document.getElementById('lastName').value = '';
                    document.getElementById('helpCategory').value = '';
                    document.getElementById('dateOfBirth').value = '';
                    document.getElementById('phoneNumber').value = '';
                    document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
                    selectedMethod = null;
                    document.getElementById('phoneNumberField').style.display = 'none';
                } else {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
            } catch (error) {
                console.error('Error submitting form:', error);
                alert('Agent on Demand says: There was an error submitting the form. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit';
            }
        }
    </script>
</body>
</html>
