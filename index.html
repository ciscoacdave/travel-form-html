<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent on Demand - Travel Information</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 1rem;
        }
        @media (min-width: 768px) {
            .form-container {
                padding: 2rem;
            }
        }
        @media (min-width: 1200px) {
            .form-container {
                max-width: 1140px;
            }
        }
        .header-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 0.5rem;
        }
        .disabled-option {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #phoneNumberField {
            display: none;
        }
        .btn-primary:disabled {
            cursor: not-allowed;
        }
        .ewt-badge {
            font-size: 0.875rem;
            padding: 0.25rem 0.5rem;
            margin-left: 0.5rem;
            border-radius: 0.25rem;
        }
        .ewt-loading {
            color: #6c757d;
        }
        .ewt-low {
            background-color: #d1e7dd;
            color: #0f5132;
        }
        .ewt-medium {
            background-color: #fff3cd;
            color: #664d03;
        }
        .ewt-high {
            background-color: #f8d7da;
            color: #842029;
        }
    </style>
</head>
<body>
    <div class="container form-container mt-3 mt-md-5">
        <div class="row justify-content-center">
            <div class="col-12">
                
                <!-- Image -->
                <div class="text-center mb-4 mb-md-5">
                    <img 
                        src="https://storage.googleapis.com/gcp-wxcctoolkit-nprd-41927.appspot.com/assets/DwOVM0HYZPOjxemCLo1foEsxRmm1/AOD.jpg"
                        alt="Agent on Demand Header" 
                        class="header-image">
                </div>

                <!-- Form Card -->
                <div class="card p-3 p-md-4 shadow">
                    <h2 class="card-title text-center mb-4">Travel Information</h2>
                    
                    <form id="travelForm">
                        
                        <!-- Final Destination -->
                        <div class="mb-3">
                            <label for="finalDestination" class="form-label">Final Destination</label>
                            <input
                                type="text"
                                class="form-control"
                                id="finalDestination"
                                name="finalDestination"
                                placeholder="Enter your final destination"
                                required>
                        </div>

                        <!-- Last Name -->
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input
                                type="text"
                                class="form-control"
                                id="lastName"
                                name="lastName"
                                placeholder="Enter your last name"
                                required>
                        </div>

                        <!-- Help Category Dropdown -->
                        <div class="mb-3">
                            <label for="helpCategory" class="form-label">What do you need help with?</label>
                            <select
                                class="form-select"
                                id="helpCategory"
                                name="helpCategory"
                                required>
                                <option value="">Select an option...</option>
                                <option value="changeFlight">Change my flight</option>
                                <option value="changeSeat">Change my seat</option>
                                <option value="Baggage">Baggage Issues</option>
                                <option value="somethingElse">Something Else</option>
                            </select>
                        </div>

                        <!-- Date of Birth -->
                        <div class="mb-4">
                            <label for="dateOfBirth" class="form-label">Date of Birth</label>
                            <input
                                type="date"
                                class="form-control"
                                id="dateOfBirth"
                                name="dateOfBirth"
                                required>
                        </div>

                        <!-- Contact Method Radio Buttons -->
                        <div class="mb-4">
                            <label class="form-label">How should we contact you?</label>
                            <div class="mt-2">
                                <div class="form-check mb-2">
                                    <input
                                        class="form-check-input"
                                        type="radio"
                                        name="contactMethod"
                                        id="phone"
                                        value="phone"
                                        required>
                                    <label class="form-check-label" for="phone">
                                        Phone
                                        <span class="ewt-badge ewt-loading" id="ewtPhone">Loading...</span>
                                    </label>
                                </div>
                                <div class="form-check mb-2 disabled-option">
                                    <input
                                        class="form-check-input"
                                        type="radio"
                                        name="contactMethod"
                                        id="video"
                                        value="video"
                                        disabled>
                                    <label class="form-check-label text-muted" for="video">
                                        Video
                                        <span class="ewt-badge ewt-loading" id="ewtVideo">Loading...</span>
                                    </label>
                                </div>
                                <div class="form-check mb-2 disabled-option">
                                    <input
                                        class="form-check-input"
                                        type="radio"
                                        name="contactMethod"
                                        id="text"
                                        value="text"
                                        disabled>
                                    <label class="form-check-label text-muted" for="text">
                                        Text
                                        <span class="ewt-badge ewt-loading" id="ewtText">Loading...</span>
                                    </label>
                                </div>
                                <div class="form-check mb-2">
                                    <input
                                        class="form-check-input"
                                        type="radio"
                                        name="contactMethod"
                                        id="appleBusiness"
                                        value="appleBusiness"
                                        required>
                                    <label class="form-check-label" for="appleBusiness">
                                        Apple Messages for Business
                                        <span class="ewt-badge ewt-loading" id="ewtApple">Loading...</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Phone Number (Conditional) -->
                        <div class="mb-4" id="phoneNumberField">
                            <label for="phoneNumber" class="form-label">Phone Number</label>
                            <input
                                type="tel"
                                class="form-control"
                                id="phoneNumber"
                                name="phoneNumber"
                                placeholder="18472695644"
                                pattern="^1[0-9]{10}$"
                                maxlength="11"
                                inputmode="numeric">
                            <div class="form-text">
                                Enter 11 digits starting with 1 (e.g., 18472695644)
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button 
                                type="submit" 
                                class="btn btn-primary btn-lg"
                                id="submitBtn">
                                Submit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // ===== CONFIGURATION =====
        // Replace these with your actual values
        const API_CONFIG = {
            baseUrl: 'https://api.wxcc-us1.cisco.com/v1',  // Change region if needed (us1, eu1, eu2, anz1)
            accessToken: 'NDQzZTg1YTctYjQ4YS00ZTJjLTk0NzgtNzM2MGM1YWMzYjU1OWU3ZmVkOWEtZWEy_PF84_000a1aaf-cc6f-4481-9e9a-660ad7f4b9d0',  // Get from Webex Contact Center
            queueIds: {
                phone: 'd60c2ae4-9196-442c-860e-c132a1dbe1c3',
                video: 'd1fa6df6-a8f6-4a0e-bf3a-fd9e9a623b4a',
                text: '2668c442-9a18-4ca6-bd4b-c4e2cffa186b',
                appleBusiness: '2668c442-9a18-4ca6-bd4b-c4e2cffa186b'
            }
        };
        
        // ===== EWT FUNCTIONS =====
        
        // Format seconds into human-readable time
        function formatWaitTime(seconds) {
            if (seconds === null || seconds === undefined) {
                return 'N/A';
            }
            
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            
            if (mins === 0) {
                return `${secs} sec${secs !== 1 ? 's' : ''}`;
            } else if (secs === 0) {
                return `${mins} min${mins !== 1 ? 's' : ''}`;
            } else {
                return `${mins} min${mins !== 1 ? 's' : ''} ${secs} sec${secs !== 1 ? 's' : ''}`;
            }
        }
        
        // Get CSS class based on wait time
        function getWaitTimeClass(seconds) {
            if (seconds === null || seconds === undefined) {
                return 'ewt-loading';
            }
            if (seconds < 120) {  // Less than 2 minutes
                return 'ewt-low';
            } else if (seconds < 600) {  // Less than 10 minutes
                return 'ewt-medium';
            } else {  // 10+ minutes
                return 'ewt-high';
            }
        }
        
        // Fetch EWT for a specific queue
        async function fetchEWT(queueId) {
            try {
                const response = await fetch(
                    `${API_CONFIG.baseUrl}/organization/${API_CONFIG.orgId}/estimated-wait-time?queueId=${queueId}`,
                    {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${API_CONFIG.accessToken}`,
                            'Accept': 'application/json'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // The API returns EWT in seconds
                return data.estimatedWaitTime || 0;
            } catch (error) {
                console.error(`Error fetching EWT for queue ${queueId}:`, error);
                return null;
            }
        }
        
        // Update EWT badge for a contact method
        function updateEWTBadge(elementId, waitTimeSeconds) {
            const badge = document.getElementById(elementId);
            if (!badge) return;
            
            // Remove all EWT classes
            badge.classList.remove('ewt-loading', 'ewt-low', 'ewt-medium', 'ewt-high');
            
            // Add appropriate class and update text
            if (waitTimeSeconds === null) {
                badge.classList.add('ewt-loading');
                badge.textContent = 'N/A';
            } else {
                const cssClass = getWaitTimeClass(waitTimeSeconds);
                badge.classList.add(cssClass);
                badge.textContent = formatWaitTime(waitTimeSeconds);
            }
        }
        
        // Fetch and update all EWT values
        async function updateAllEWT() {
            // Fetch all EWT values in parallel
            const [phoneEWT, videoEWT, textEWT, appleEWT] = await Promise.all([
                fetchEWT(API_CONFIG.queueIds.phone),
                fetchEWT(API_CONFIG.queueIds.video),
                fetchEWT(API_CONFIG.queueIds.text),
                fetchEWT(API_CONFIG.queueIds.appleBusiness)
            ]);
            
            // Update all badges
            updateEWTBadge('ewtPhone', phoneEWT);
            updateEWTBadge('ewtVideo', videoEWT);
            updateEWTBadge('ewtText', textEWT);
            updateEWTBadge('ewtApple', appleEWT);
            
            // Optionally disable/enable options based on wait time
            // For example, disable if wait time > 10 minutes (600 seconds)
            const videoRadio = document.getElementById('video');
            const textRadio = document.getElementById('text');
            
            if (videoEWT !== null && videoEWT > 600) {
                videoRadio.disabled = true;
            }
            
            if (textEWT !== null && textEWT > 600) {
                textRadio.disabled = true;
            }
        }
        
        // Initialize EWT on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Fetch EWT immediately
            updateAllEWT();
            
            // Refresh EWT every 30 seconds
            setInterval(updateAllEWT, 30000);
        });
        
        // ===== FORM HANDLING =====
        
        // Get form elements
        const form = document.getElementById('travelForm');
        const phoneRadio = document.getElementById('phone');
        const textRadio = document.getElementById('text');
        const appleBusinessRadio = document.getElementById('appleBusiness');
        const phoneNumberField = document.getElementById('phoneNumberField');
        const phoneNumberInput = document.getElementById('phoneNumber');
        const submitBtn = document.getElementById('submitBtn');
        
        // Show/hide phone number field based on contact method
        const contactMethodRadios = document.querySelectorAll('input[name="contactMethod"]');
        contactMethodRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'phone' || this.value === 'text') {
                    phoneNumberField.style.display = 'block';
                    phoneNumberInput.required = true;
                } else {
                    phoneNumberField.style.display = 'none';
                    phoneNumberInput.required = false;
                    phoneNumberInput.value = '';
                }
            });
        });
        
        // Format phone number input
        phoneNumberInput.addEventListener('input', function(e) {
            // Remove all non-digits
            let value = e.target.value.replace(/\D/g, '');
            
            // Limit to 11 digits
            if (value.length > 11) {
                value = value.slice(0, 11);
            }
            
            e.target.value = value;
        });
        
        // Handle form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Get form values
            const formData = {
                finalDestination: document.getElementById('finalDestination').value,
                lastName: document.getElementById('lastName').value,
                helpCategory: document.getElementById('helpCategory').value,
                dateOfBirth: document.getElementById('dateOfBirth').value,
                contactMethod: document.querySelector('input[name="contactMethod"]:checked').value,
                phoneNumber: phoneNumberInput.value
            };
            
            // Validate phone number if phone or text is selected
            if ((formData.contactMethod === 'phone' || formData.contactMethod === 'text') && formData.phoneNumber) {
                if (formData.phoneNumber.length !== 11 || !formData.phoneNumber.startsWith('1')) {
                    alert('Agent on Demand says: Please enter a valid US phone number in format: 18472695644 (11 digits starting with 1)');
                    return;
                }
            }
            
            // Handle Apple Messages for Business
            if (formData.contactMethod === 'appleBusiness') {
                try {
                    // Determine Apple Messages URL based on help category
                    const messagesUrlMapping = {
                        'changeFlight': 'https://bcrw.apple.com/messages/api/messageprofiles/redirecthelper?service=iMessage&recipient=urn:biz:6f6ab203-6ead-450a-bcae-24662cb6aae0&body=Change%20Flight',
                        'changeSeat': 'https://bcrw.apple.com/messages/api/messageprofiles/redirecthelper?service=iMessage&recipient=urn:biz:6f6ab203-6ead-450a-bcae-24662cb6aae0&body=Change%20Seat',
                        'Baggage': 'https://bcrw.apple.com/messages/api/messageprofiles/redirecthelper?service=iMessage&recipient=urn:biz:6f6ab203-6ead-450a-bcae-24662cb6aae0&body=Baggage%20Issues',
                        'somethingElse': 'https://bcrw.apple.com/messages/api/messageprofiles/redirecthelper?service=iMessage&recipient=urn:biz:6f6ab203-6ead-450a-bcae-24662cb6aae0&body=Something%20Else'
                    };
                    
                    const messagesUrl = messagesUrlMapping[formData.helpCategory];
                    
                    if (!messagesUrl) {
                        alert('Agent on Demand says: Invalid help category selected.');
                        return;
                    }
                    
                    // Open Apple Messages app
                    window.open(messagesUrl, '_blank');
                    
                    alert('Agent on Demand says: Opening Apple Messages for Business...');
                    
                    // Reset form
                    form.reset();
                    phoneNumberField.style.display = 'none';
                    return;
                } catch (error) {
                    console.error('Error opening Apple Messages:', error);
                    alert('Agent on Demand says: There was an error opening Apple Messages. Please try again.');
                    return;
                }
            }
            
            // Handle webhook submission for phone/video/text
            const webhookUrl = 'https://hooks.us.webexconnect.io/events/1V5WO20HJQ';
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            try {
                // Prepare data for webhook
                const webhookData = {
                    finalDestination: formData.finalDestination,
                    lastName: formData.lastName,
                    helpCategory: formData.helpCategory,
                    dateOfBirth: formData.dateOfBirth,
                    contactMethod: formData.contactMethod,
                    timestamp: new Date().toISOString()
                };
                
                // Include phone number if phone or text is selected
                if (formData.contactMethod === 'phone' || formData.contactMethod === 'text') {
                    webhookData.phoneNumber = formData.phoneNumber;
                }
                
                // Send data to webhook
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(webhookData)
                });
                
                if (response.ok) {
                    alert('Agent on Demand says: Form submitted successfully!');
                    // Reset form
                    form.reset();
                    phoneNumberField.style.display = 'none';
                } else {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
            } catch (error) {
                console.error('Error submitting form:', error);
                alert('Agent on Demand says: There was an error submitting the form. Please try again.');
            } finally {
                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit';
            }
        });
    </script>
</body>
</html>
